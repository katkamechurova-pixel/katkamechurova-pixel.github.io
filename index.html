<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fafafa;
            color: #333;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-weight: 300;
            font-size: 2rem;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        p {
            color: #888;
            font-size: 0.9rem;
        }
        .loader {
            width: 40px;
            height: 2px;
            background-color: #eee;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
        }
        .loader::after {
            content: '';
            position: absolute;
            left: -50%;
            height: 100%;
            width: 50%;
            background-color: #333;
            animation: progress 1.5s infinite ease-in-out;
        }
        @keyframes progress {
            0% { left: -50%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Work in Progress</h1>
        <div class="loader"></div>
        <p>Refining the experience. See you shortly.</p>
    </div>
</body>
</html>
